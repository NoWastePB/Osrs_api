name: Update OSRS Quests

on:

  workflow_dispatch:

  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: write

jobs:

  scrape:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scripts/scrape_quests.py

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data/quests.json

          git diff --staged --quiet || (
            git commit -m "Update quest data"
            git push
          )
