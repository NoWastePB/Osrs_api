name: OSRS Data Engine V7.1

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install aiohttp beautifulsoup4 requests

      - run: python scripts/osrs_v7_1.py

      - run: |
          git config user.name "osrs-bot"
          git config user.email "osrs-bot@users.noreply.github.com"
          git add data/ graph/ meta/
          git commit -m "V7.1 update" || echo "no changes"
          git push
