name: OSRS Data Engine V7

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install aiohttp beautifulsoup4 requests

      - name: Run OSRS engine
        run: python scripts/osrs_v7.py

      - name: Commit dataset
        run: |
          git config user.name "osrs-bot"
          git config user.email "osrs-bot@users.noreply.github.com"

          git add data/ graph/ meta/

          git commit -m "OSRS V7 update $(date +'%Y-%m-%d')" || echo "No changes"

          git push
